    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"

      name="description"
      content="Descubra o poder do Pilates no ambiente mais acolhedor e premium de Santa Cruz do Sul. Agende sua aula experimental no Lazuli."

    <meta property="og:type" content="website" />
    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(
            null,
            "",
            location.pathname.slice(0, -1) + decoded + location.hash,
          );
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
